          <div style={{background:done===allTasks.length?"#43a047":gold,height:"100%",borderRadius:20,width:`${(done/allTasks.length)*100}%`,transition:"width 0.4s"}}/>
        </div>
        <div style={{fontSize:10,color:"#888",marginTop:5}}>{allTasks.length-done} tareas pendientes \u00B7 toca para marcar</div>
      </div>

      {cats.map(cat=>{
        const tasks=allTasks.filter(t=>t.cat===cat);
        const catDone=tasks.filter(t=>checked[t.id]).length;
        const isR=cat.includes("\uD83D\uDD34"),isY=cat.includes("\uD83D\uDFE1"),isT=cat.includes("\uD83C\uDF9F");
        const hBg=isR?"#fce4ec":isY?"#fff8e1":isT?"#e3f2fd":"#f3e5f5";
        const hC=isR?"#c62828":isY?"#e65100":isT?"#01579b":"#6a1b9a";
        const hB=isR?"#f48fb1":isY?"#ffd54f":isT?"#90caf9":"#ce93d8";
        return(
          <div key={cat} style={{background:"white",borderRadius:14,border:"1px solid #e0d8cc",overflow:"hidden",marginBottom:12,boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
            <div style={{background:hBg,padding:"10px 14px",borderBottom:`1px solid ${hB}`,display:"flex",justifyContent:"space-between"}}>
              <div style={{fontSize:11,fontWeight:700,color:hC}}>{cat}</div>
              <div style={{fontSize:10,color:hC,opacity:0.8}}>{catDone}/{tasks.length}</div>
            </div>
            {tasks.map((t,i)=>{
              const isDone=!!checked[t.id];
              return(
                <div key={t.id} onClick={()=>toggle(t.id)} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",borderBottom:i<tasks.length-1?"1px solid #f4f0e8":"none",background:isDone?"#f8fdf8":"white",cursor:"pointer"}}>
                  <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${isDone?"#43a047":gold}`,background:isDone?"#43a047":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                    {isDone&&<span style={{color:"white",fontSize:12,fontWeight:700}}>{"\u2713"}</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:12,color:isDone?"#888":navy,textDecoration:isDone?"line-through":"none"}}>{t.label}</div>
                    <div style={{fontSize:10,color:isDone?"#bbb":"#666",marginTop:2,lineHeight:1.5}}>{t.detail}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5,flexWrap:"wrap"}}>
                      {t.clp!=="\u2014"&&<span style={{background:"#f8f4ec",border:"1px solid #e0d0a0",borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:600,color:"#7a5a00"}}>{t.clp}</span>}
                      {t.link&&!isDone&&(
                        <a href={t.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{background:isR?"#fce4ec":isT?"#e3f2fd":"#e8f5e9",border:`1px solid ${isR?"#f48fb1":isT?"#90caf9":"#81c784"}`,color:isR?"#c62828":isT?"#0277bd":"#2e7d32",borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:600,textDecoration:"none"}}>{t.ll} {"\u2192"}</a>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      <div style={{background:navy,borderRadius:12,padding:"14px",textAlign:"center"}}>
        <div style={{fontSize:11,color:"#b0c4d8",marginBottom:3}}>Airbnb Oslo se cobra el</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",fontWeight:700,color:gold}}>1 de junio 2026</div>
        <div style={{fontSize:10,color:"#90caf9",marginTop:2}}>~$650 USD {"\u00B7"} ~$603k CLP {"\u00B7"} HMF3TJ4NPS</div>
      </div>
    </div>
  )}
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
