  "NO":["\uD83C\uDDF3\uD83C\uDDF4","Oslo","Noruega"],
};
const matchesCountry=(text,cid)=>{
  if(cid==="all")return true;
  return(countryMap[cid]||[]).some(k=>text.includes(k));
};
const dayDates=dayByDay.map(d=>d.date);

  if(filterCountry!=="all"&&!matchesCountry(d.city+d.flag,filterCountry))return false;
  if(filterDay!=="all"&&d.date!==filterDay)return false;
  return true;
});
const filteredItinerary=itinerary.filter(r=>{
  if(filterCountry==="all")return true;
  return matchesCountry(r.city+r.icon+r.detail,filterCountry);
});
const filteredHotels=hotels.filter(h=>{
  if(filterCountry==="all")return true;
  return matchesCountry(h.city+h.flag+h.addr,filterCountry);
});
const filteredMaps=mapPlaces.filter(p=>{
  if(filterCountry==="all")return true;
  return matchesCountry(p.city+p.flag,filterCountry);
});
const showFilters=["full","maps"].includes(tab);

        {"\uD83D\uDCB1"} <strong>1 USD = $928 CLP</strong> {"\u00B7"} actualizado 21 mar 2026
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:12,fontWeight:600,color:"#999",letterSpacing:0.5}}>Filtrar</span>
        {finCats.map(c=>(
          <button key={c} onClick={()=>setFilterFinCat(c)} style={{padding:"4px 10px",fontSize:14,fontWeight:filterFinCat===c?600:400,borderRadius:8,border:filterFinCat===c?`2px solid ${navy}`:"1px solid #ddd",background:filterFinCat===c?"#f5e8e0":"white",color:filterFinCat===c?navy:"#888",cursor:"pointer"}}>{c}</button>
        ))}
      </div>
      {/* CARD TOTAL */}
      <div style={{background:`linear-gradient(135deg,#4a3540,#5a4550)`,borderRadius:14,padding:"18px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:2,textTransform:"uppercase",color:gold}}>Total del viaje</div>
          <div style={{fontFamily:"'Raleway',sans-serif",fontSize:"1.3rem",fontWeight:700,color:"white"}}>~${granTotalMin.toLocaleString("es-CL")} a ${granTotalMax.toLocaleString("es-CL")}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Pagado</div>
            <div style={{fontFamily:"'Raleway',sans-serif",fontSize:"1.1rem",fontWeight:700,color:"#e0c8bb"}}>${totalPaid.toLocaleString("es-CL")}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>${Math.round(totalPaid/2).toLocaleString("es-CL")} c/u</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Por pagar</div>
            <div style={{fontFamily:"'Raleway',sans-serif",fontSize:"1.1rem",fontWeight:700,color:"#ffb74d"}}>~${pendingMin.toLocaleString("es-CL")}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>a ~${pendingMax.toLocaleString("es-CL")}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Javi</div>
            <div style={{fontFamily:"'Raleway',sans-serif",fontSize:"1rem",fontWeight:700,color:gold}}>~${Math.round(granTotalMin/2).toLocaleString("es-CL")}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>a ~${Math.round(granTotalMax/2).toLocaleString("es-CL")}</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Bryan</div>
            <div style={{fontFamily:"'Raleway',sans-serif",fontSize:"1rem",fontWeight:700,color:gold}}>~${Math.round(granTotalMin/2).toLocaleString("es-CL")}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>a ~${Math.round(granTotalMax/2).toLocaleString("es-CL")}</div>
          </div>
        </div>
      </div>

      <div style={{background:"white",borderRadius:14,border:"1px solid #e0ddd8",overflow:"hidden",marginBottom:12,boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
        <div style={{background:"#f5e8e0",padding:"9px 14px",borderBottom:"1px solid #c8e6c9",fontSize:13,fontWeight:700,textTransform:"uppercase",color:"#6b5050"}}>{"\u2705"} Ya pagado</div>
        {filteredPaid.map((r,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderBottom:i<filteredPaid.length-1?"1px solid #f4f0e8":"none",background:"white",gap:8,flexWrap:"wrap"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,color:navy,fontWeight:600}}>{r.item}</div>
              {r.detail&&<div style={{fontSize:10,color:"#999",marginTop:1}}>{r.detail}</div>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{background:r.cat==="Vuelos"?"#f5e8e0":r.cat==="Alojamiento"?"#fff8e1":r.cat==="Transporte"?"#f0f5f0":r.cat==="Comidas"?"#f5e8e0":"#f5f5f5",border:`1px solid ${r.cat==="Vuelos"?"#e0c8bb":r.cat==="Alojamiento"?"#ffe082":r.cat==="Transporte"?"#e0c8bb":r.cat==="Comidas"?"#e0c8bb":"#ddd"}`,color:r.cat==="Vuelos"?"#6b5050":r.cat==="Alojamiento"?"#f57f17":r.cat==="Transporte"?"#6b5050":r.cat==="Comidas"?"#6b5050":"#666",borderRadius:8,padding:"1px 6px",fontSize:14,fontWeight:600}}>{r.cat}</span>
              <span style={{fontWeight:700,color:navy,fontSize:12,textAlign:"right"}}>${r.clp.toLocaleString("es-CL")}</span>
            </div>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"#f5e8e0",borderTop:"1px solid #c8e6c9"}}>
          <span style={{fontWeight:700,color:"#6b5050",fontSize:13}}>Total pagado</span>
          <span style={{fontWeight:700,color:"#6b5050",fontSize:14}}>${filteredTotal.toLocaleString("es-CL")}{filterFinCat!=="Todos"&&` (${filterFinCat})`}</span>
        </div>
      </div>

      <div style={{background:"white",borderRadius:14,border:"1px solid #e0ddd8",overflow:"hidden",marginBottom:12,boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
        <div style={{background:"#fce8e8",padding:"9px 14px",borderBottom:"1px solid #dea5a4",fontSize:13,fontWeight:700,textTransform:"uppercase",color:"#8b5e5e"}}>{"\u23F3"} Por pagar</div>
        {filteredPending.map((r,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderBottom:i<filteredPending.length-1?"1px solid #f4f0e8":"none",gap:8,flexWrap:"wrap"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,color:navy,fontWeight:600}}>{r.item}</div>
              {r.detail&&<div style={{fontSize:10,color:"#999",marginTop:1}}>{r.detail}</div>}
              <span style={{background:r.when.includes("\uD83D\uDD34")?"#fce8e8":"#fff8e1",border:`1px solid ${r.when.includes("\uD83D\uDD34")?"#dea5a4":"#ffd54f"}`,color:r.when.includes("\uD83D\uDD34")?"#8b5e5e":"#8b6b5e",borderRadius:10,padding:"1px 6px",fontSize:15,fontWeight:600,display:"inline-block",marginTop:4}}>{r.when}</span>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{background:r.cat==="Vuelos"?"#f5e8e0":r.cat==="Transporte"?"#f0f5f0":"#f5f5f5",border:`1px solid ${r.cat==="Vuelos"?"#e0c8bb":r.cat==="Transporte"?"#e0c8bb":"#ddd"}`,color:r.cat==="Vuelos"?"#6b5050":r.cat==="Transporte"?"#6b5050":"#666",borderRadius:8,padding:"1px 6px",fontSize:14,fontWeight:600}}>{r.cat}</span>
              <span style={{fontWeight:700,color:"#8b5e5e",fontSize:12}}>{r.clp==="comidas"?`~$${totalComidas.toLocaleString("es-CL")}`:r.clp}</span>
              {r.link&&<a href={r.link} target="_blank" rel="noreferrer" style={{background:"#f5e8e0",border:"1px solid #a5d6a7",color:"#6b5050",borderRadius:6,padding:"3px 8px",fontSize:15,fontWeight:600,textDecoration:"none"}}>{"\u2192"}</a>}
            </div>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"#fff3e0",borderTop:"1px solid #ffe0b2"}}>
          <span style={{fontWeight:700,color:"#8b5e5e",fontSize:13}}>Total por pagar</span>
          <span style={{fontWeight:700,color:"#8b5e5e",fontSize:14}}>~${(pendingMin+totalComidas).toLocaleString("es-CL")} a ${(pendingMax+totalComidas).toLocaleString("es-CL")}</span>
        </div>
      </div>

      {/* TOTAL GENERAL */}
      <div style={{background:`linear-gradient(135deg,#4a3540,#5a4550)`,borderRadius:14,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,color:gold,fontSize:14,textTransform:"uppercase",letterSpacing:1}}>Total del viaje</span>
          <span style={{fontFamily:"'Raleway',sans-serif",fontWeight:700,color:"white",fontSize:"1.2rem"}}>~${granTotalMin.toLocaleString("es-CL")} a ${granTotalMax.toLocaleString("es-CL")}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <span style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>Por persona</span>
          <span style={{fontSize:12,color:gold,fontWeight:600}}>~${Math.round(granTotalMin/2).toLocaleString("es-CL")} a ${Math.round(granTotalMax/2).toLocaleString("es-CL")}</span>
        </div>
      </div>

    </div>
  )}

  {/* PENDIENTES */}
  {tab==="pending"&&(
    <div style={{padding:"16px",maxWidth:860,margin:"0 auto"}}>
      <div style={{background:"white",borderRadius:14,border:"1px solid #e0ddd8",padding:"14px",marginBottom:14,boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:15,color:navy}}>Progreso</div>
          <div style={{fontFamily:"'Raleway',sans-serif",fontSize:"1.2rem",fontWeight:700,color:done===allTasks.length?"#6b5050":gold}}>{done}/{allTasks.length}</div>
        </div>
        <div style={{background:"#f0ebe5",borderRadius:20,height:10,overflow:"hidden"}}>
          <div style={{background:done===allTasks.length?"#8b6b6b":gold,height:"100%",borderRadius:20,width:`${(done/allTasks.length)*100}%`,transition:"width 0.4s"}}/>
        </div>
        <div style={{fontSize:12,color:"#999",marginTop:6}}>{allTasks.length-done} tareas pendientes {"·"} toca para marcar</div>
      </div>

      {cats.map(cat=>{
        const tasks=allTasks.filter(t=>t.cat===cat);
        const catDone=tasks.filter(t=>checked[t.id]).length;
        const isR=cat.includes("\uD83D\uDD34"),isY=cat.includes("\uD83D\uDFE1"),isT=cat.includes("\uD83C\uDF9F");
        const hBg=isR?"#fce8e8":isY?"#faf5ee":isT?"#f5e8e0":"#f0f5f0";
        const hC=isR?"#8b5e5e":isY?"#8b6b5e":isT?"#6b5050":"#6b5050";
        const hB=isR?"#dea5a4":isY?"#e0d0a0":isT?"#e0c8bb":"#e0c8bb";
        return(
          <div key={cat} style={{background:"white",borderRadius:14,border:"1px solid #e0ddd8",overflow:"hidden",marginBottom:12,boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
            <div style={{background:hBg,padding:"10px 14px",borderBottom:`1px solid ${hB}`,display:"flex",justifyContent:"space-between"}}>
              <div style={{fontSize:15,fontWeight:700,color:hC}}>{cat}</div>
              <div style={{fontSize:10,color:hC,opacity:0.8}}>{catDone}/{tasks.length}</div>
            </div>
            {tasks.map((t,i)=>{
              const isDone=!!checked[t.id];
              return(
                <div key={t.id} onClick={()=>toggle(t.id)} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",borderBottom:i<tasks.length-1?"1px solid #f4f0e8":"none",background:isDone?"#f8f8f6":"white",cursor:"pointer"}}>
                  <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${isDone?"#8b6b6b":gold}`,background:isDone?"#8b6b6b":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                    {isDone&&<span style={{color:"white",fontSize:14,fontWeight:700}}>{"\u2713"}</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:isDone?"#888":navy,textDecoration:isDone?"line-through":"none"}}>{t.label}</div>
                    <div style={{fontSize:10,color:isDone?"#bbb":"#666",marginTop:2,lineHeight:1.5}}>{t.detail}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5,flexWrap:"wrap"}}>
                      {t.clp!=="\u2014"&&<span style={{background:"#f8f4ec",border:"1px solid #e0d0a0",borderRadius:10,padding:"1px 7px",fontSize:15,fontWeight:600,color:"#8b6b68"}}>{t.clp}</span>}
                      {t.link&&!isDone&&(
                        <a href={t.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{background:isR?"#fce8e8":isT?"#f5e8e0":"#f5e8e0",border:`1px solid ${isR?"#dea5a4":isT?"#e0c8bb":"#e0c8bb"}`,color:isR?"#8b5e5e":isT?"#6b5050":"#6b5050",borderRadius:6,padding:"2px 7px",fontSize:14,fontWeight:600,textDecoration:"none"}}>{t.ll} {"\u2192"}</a>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      <div style={{background:navy,borderRadius:12,padding:"14px",textAlign:"center"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginBottom:3}}>Airbnb Oslo se cobra el</div>
        <div style={{fontFamily:"'Raleway',sans-serif",fontSize:"1.1rem",fontWeight:700,color:gold}}>1 de junio 2026</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.55)",marginTop:2}}>~US$650 {"\u00B7"} ~$603.000 CLP {"\u00B7"} HMF3TJ4NPS</div>
      </div>
    </div>
  )}
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
